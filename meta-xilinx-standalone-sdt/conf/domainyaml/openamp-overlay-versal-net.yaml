reserved-memory:
  ranges: true
  "#size-cells": 2
  "#address-cells": 2

  ddrboot@9800100:
    no-map: 1
    start: 0x9800100
    size: 0x5FF00
  vdev0vring0@9860000:
    start: 0x9860000
    size: 0x4000
    no-map: 1
  vdev0vring1@9864000:
    start: 0x9864000
    size: 0x4000
    no-map: 1
  vdev0buffer@9868000:
    size: 0x40000
    start: 0x9868000
    no-map: 1
  rsctbl@9800000:
    start: 0x9800000
    size: 0x100
    no-map: 1

domains:
  APU_Linux:
    compatible: openamp,domain-v1
    cpus:
      - cluster: cpus_a78
        cpumask: 0xff
        mode:
          secure: false
          el: 0x3
    os,type: linux
    reserved-memory:
      - vdev0vring0@9860000
      - vdev0vring1@9864000
      - vdev0buffer@9868000
      - ddrboot@9800100
      - rsctbl@9800000

    domain-to-domain:
      compatible: openamp,domain-to-domain-v1
      remoteproc-relation:
        compatible: openamp,remoteproc-v2
        relation0:
            remote: RPU_Zephyr
            elfload: [ psx_wizard_0_psxl_0_psx_r52_0a_atcm_global, psx_wizard_0_psxl_0_psx_r52_0a_btcm_global, psx_wizard_0_psxl_0_psx_r52_0a_ctcm_global, ddrboot@9800100, rsctbl@9800000 ]

      rpmsg-relation:
        compatible: openamp,rpmsg-v1
        relation0:
            remote: RPU_Zephyr
            carveouts: [ vdev0vring0@9860000, vdev0vring1@9864000, vdev0buffer@9868000 ]
            mbox: ipi_nobuf1_to_ipi_nobuf2

  RPU_Zephyr:
    compatible: openamp,domain-v1
    cpus: 
      - cluster: cpus_r52_0
        cluster_cpu: psx_cortexr52_0
        cpumask: 0x1
        mode:
          secure: true
          el: 0x3  
    os,type: zephyr
    xlnx,ddr-boot: true
    xlnx,zephyr,mems: [ ddrboot@9800100 ]
    domain-to-domain:
      compatible: openamp,domain-to-domain-v1
      rpmsg-relation:
        compatible: openamp,rpmsg-v1
        relation0:
          host: APU_Linux
          mbox: ipi_nobuf2_to_ipi_nobuf1
          carveouts: [ vdev0vring0@9860000, vdev0vring1@9864000, vdev0buffer@9868000 ]
    sram:
      - dev: ddrboot@9800100
        start: 0x9800100
        size: 0x5FF00
      - dev: psx_wizard_0_psxl_0_psx_r52_0a_atcm_global@eba00000
        label: psx_wizard_0_psxl_0_psx_r52_0a_atcm_global
        size: 64K
        spec_name: psx_wizard_0_psxl_0_psx_r52_0a_atcm_global
        start: '0xeba00000'
      - dev: psx_wizard_0_psxl_0_psx_r52_0a_btcm_global@eba10000
        label: psx_wizard_0_psxl_0_psx_r52_0a_btcm_global
        size: 32K
        spec_name: psx_wizard_0_psxl_0_psx_r52_0a_btcm_global
        start: '0xeba10000'
      - dev: psx_wizard_0_psxl_0_psx_r52_0a_ctcm_global@eba20000
        label: psx_wizard_0_psxl_0_psx_r52_0a_ctcm_global
        size: 32K
        spec_name: psx_wizard_0_psxl_0_psx_r52_0a_ctcm_global
        start: '0xeba20000'
    reserved-memory:
        - ddrboot@9800100
