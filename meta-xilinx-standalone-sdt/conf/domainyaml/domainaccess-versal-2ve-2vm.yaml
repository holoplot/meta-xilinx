  RPU_Zephyr:
    compatible: openamp,domain-v1
    cpus: 
      - cluster: cpus_r52_0
        cluster_cpu: cortexr52_0
        cpumask: 0x1
        mode:
          secure: true
          el: 0x3  
    os,type: zephyr

    access:
      - dev: serial@f1920000
        label: serial0
      - dev: memory@00000000
        label: NoC_C0_C1_ddr_memory
      - dev: memory@BBF00000
        label: ps_wizard_0_ps11_0_ocm_ram_0_memory
      - dev: memory@BBF80000
        label: ps_wizard_0_ps11_0_ocm_ram_1_memory
      - dev: memory@BBE00000
        label: ps_wizard_0_ps11_0_ocm_ram_2_memory
      - dev: memory@BBE80000
        label: ps_wizard_0_ps11_0_ocm_ram_3_memory
      - dev: ddrboot@9800100
        flags: {}
      - dev: ipc@9860000
        flags: {}
      - dev: timer@f1e80000
        flags: {}
        label: ttc2
      - dev: mailbox@eb340000
        flags: {}
        label: ipi1
      - dev: mailbox@eb3b1000
        flags: {}
        label: ipi_nobuf2
