domains:
  APU_Linux:
    compatible: openamp,domain-v1
    cpus:
      - cluster: cpus_a78
        cpumask: 0xff
        mode:
          secure: false
          el: 0x3
    os,type: linux

    domain-to-domain:
      compatible: openamp,domain-to-domain-v1

      libmetal-relation:
        compatible: libmetal,ipc-v1
        relation0:
            remote: RPU_1_BM
            carveouts: [ libmetal_uio_desc0@9908000, libmetal_uio_desc1@990c000, libmetal_uio_data@9910000 ]
            mbox: ipi_5_to_ipi_2
            timer: ttc2

  RPU_1_BM:
    compatible: openamp,domain-v1
    cpus:
      - cluster: cpus_r52_1
        cluster_cpu: psx_cortexr52_1
        cpumask: 0x2
        mode:
          secure: true
          el: 0x3
    os,type: baremetal
    xlnx,ddr-boot: true
    domain-to-domain:
      compatible: openamp,domain-to-domain-v1

      libmetal-relation:
        compatible: libmetal,ipc-v1
        relation0:
            host: APU_Linux
            carveouts: [ libmetal_uio_desc0@9908000, libmetal_uio_desc1@990c000, libmetal_uio_data@9910000 ]
            mbox: ipi_2_to_ipi_5
            timer: ttc2
            elfload: [ libmetal_elf@98a8000 ]

    sram:
      - dev: psx_wizard_0_psxl_0_psx_r52_1a_atcm_global@eba40000
