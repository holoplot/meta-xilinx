reserved-memory:
  ranges: true
  "#size-cells": 2
  "#address-cells": 2

  libmetal_elf@98a8000:
    start: 0x98a8000
    size: 0x60000
    no-map: 1
  libmetal_desc0@9908000:
    start: 0x9908000
    size: 0x4000
    no-map: 1
  libmetal_desc1@990c000:
    start: 0x990c000
    size: 0x4000
    no-map: 1
  libmetal_data@9910000:
    start: 0x9910000
    size: 0x40000
    no-map: 1

axi:
  libmetal_uio_desc0@9908000:
    start: 0x9908000
    size: 0x4000
    compatible: "uio"
  libmetal_uio_desc1@990c000:
    start: 0x990c000
    size: 0x4000
    compatible: "uio"
  libmetal_uio_data@9910000:
    start: 0x9910000
    size: 0x40000
    compatible: "uio"

  timer@ff100000:
    compatible: "uio"
  # linux -> rpu1 libmetal IPI
  mailbox@ff380000:
    compatible: "uio"

domains:
    openamp_a72_0_cluster: # host in channel from a72-0
        compatible:
            - "openamp,domain-v1"
        cpus:
            - cluster: cpus_a72
              cpumask: 0x1
              mode:
                 secure: true
                 el: 0x3
        os,type: linux

        domain-to-domain:
            compatible: openamp,domain-to-domain-v1

            libmetal-relation:
                compatible: libmetal,ipc-v1
                relation0:
                    remote: openamp_r5_1_cluster
                    carveouts: [ libmetal_uio_desc0@9908000, libmetal_uio_desc1@990c000, libmetal_uio_data@9910000 ]
                    mbox: ipi_5_to_ipi_2 # IPI3 OpenAMP example app (APU)
                    timer: ttc2

    openamp_r5_1_cluster:
        compatible: openamp,domain-v1
        cpus:
          - cluster: cpus_r5_1
            cpumask: 0x2
            mode:
              secure: true
              el: 0x3
              cluster_cpu: psv_cortexr5_1
        os,type: baremetal
        domain-to-domain:
            compatible: openamp,domain-to-domain-v1
            libmetal-relation:
                compatible: libmetal,ipc-v1
                relation0:
                    host: openamp_a72_0_cluster
                    carveouts: [ libmetal_uio_desc0@9908000, libmetal_uio_desc1@990c000, libmetal_uio_data@9910000 ]
                    mbox: ipi_2_to_ipi_5 #IPI2 Libmetal example app (RPU)
                    timer: ttc2
                    elfload: [ libmetal_elf@98a8000 ]

        sram:
            - dev: libmetal_elf@98a8000
              start: 0x98a8000
              size: 0x60000
            - dev: psv_r5_1_atcm_global@ffe90000
              size: 64K
              start: 0xffe90000
