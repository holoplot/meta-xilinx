      size: 128M
      no-map: true
  rpu_a0_openamp_reserved_memory: &rpu_a0_openamp_reserved_memory
    - start: '0x02000000'
      size: 4M
      no-map: true
  rpu_a1_openamp_reserved_memory: &rpu_a1_openamp_reserved_memory
