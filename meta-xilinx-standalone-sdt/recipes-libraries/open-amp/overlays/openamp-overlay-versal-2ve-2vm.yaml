      - dev: mailbox@eb340000
        flags: {}
        label: ipi1
        spec_name: IPI1
      - dev: mailbox@eb3b1000
        flags: {}
        label: ipi_nobuf2
        spec_name: IPI_NO_BUF2
      - dev: mailbox@eb3b0000
        flags: {}
        label: ipi_nobuf1
        spec_name: IPI_NO_BUF1
      - dev: serial@f1920000
        flags: {}
        label: serial0
        spec_name: UART0
 
  RPU_BM:
    compatible: openamp,domain-v1
    cpus:
      - cluster: cpus_r52_1
        cluster_cpu: cortexr52_1
        cpumask: 0x2
        mode:
          secure: true
          el: 0x3  
    os,type: baremetal
    memory:
    sram:
      - dev: r52_1a_atcm_global@eba40000
