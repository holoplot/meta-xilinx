definitions:
  plm_reserved_memory: &plm_reserved_memory
    - start: '0x00000000'
      size: 16M
      no-map : true
  tfa_handoff_reserved_memory: &tfa_handoff_reserved_memory
    - start: '0x01000000'
      size: 6M
      no-map: true
  tfa_runtime_memory:  &tfa_runtime_memory
