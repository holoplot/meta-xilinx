      size: 32M
      no-map: true
  rpu_a1_isp_reserved_memory: &rpu_a1_isp_reserved_memory
    - start: '0x06800000'
      size: 32M
      no-map: true
  rpu_b0_isp_reserved_memory: &rpu_b0_isp_reserved_memory
    - start: '0x08800000'
      size: 32M
      no-map: true
  rpu_b1_isp_reserved_memory: &rpu_b1_isp_reserved_memory
    - start: '0x0a800000'
      size: 32M
      no-map: true
  rpu_c0_isp_reserved_memory: &rpu_c0_isp_reserved_memory
    - start: '0x0c800000'
      size: 32M
      no-map: true
  rpu_c1_isp_reserved_memory: &rpu_c1_isp_reserved_memory
    - start: '0x0e800000'
      size: 32M
      no-map: true
  rpu_d0_isp_reserved_memory: &rpu_d0_isp_reserved_memory
    - start: '0x10800000'
      size: 32M
      no-map: true
  rpu_d1_isp_reserved_memory: &rpu_d1_isp_reserved_memory
    - start: '0x12800000'
      size: 32M
      no-map: true
  rpu_e0_isp_reserved_memory: &rpu_e0_isp_reserved_memory
    - start: '0x14800000'
      size: 32M
      no-map: true
  rpu_e1_isp_reserved_memory: &rpu_e1_isp_reserved_memory
    - start: '0x16800000'
      size: 32M
      no-map: true
  ddrboot: &ddrboot
    - start: 0x9800000
      size: 0x60000
      no-map: 1
  rpu0vdev0vring0: &rpu0vdev0vring0
    - start: 0x9860000
      size: 0x4000
      no-map: 1
  rpu0vdev0vring1: &rpu0vdev0vring1
    - start: 0x9864000
      size: 0x4000
      no-map: 1
  rpu0vdev0buffer: &rpu0vdev0buffer
    - start: 0x9868000
      size: 0x40000
      no-map: 1
  rsctbl: &rsctbl
    - start: 0x97FFF00
      size: 0x10 
      no-map: 1



domains:
  APU_Linux:
    compatible: openamp,domain-v1
    cpus:
      - cluster: cpus_a78
        cpumask: 0xf
        mode:
          secure: false
          el: 0x3   
    os,type: linux
    domain-to-domain:
        compatible: openamp,domain-to-domain-v1
        remoteproc-relation:
            compatible: openamp,remoteproc-v2
            remote:
                - RPU_Zephyr
            elfload:
                - [ r52_0a_atcm_global, r52_0a_btcm_global, r52_0a_ctcm_global, ddrboot, rsctbl ]

        rpmsg-relation:
            compatible: openamp,rpmsg-v1
            remote:
                - RPU_Zephyr
            carveouts:
                 - rpu0vdev0vring0
                 - rpu0vdev0vring1
                 - rpu0vdev0buffer
            mbox:
                - mailbox@eb3b0000
    reserved-memory:
        <<+: [ *plm_reserved_memory ,
               *tfa_handoff_reserved_memory,
               *tfa_runtime_memory,
               *optee_shared_buffs,
               *rpu_a0_openamp_reserved_memory,
               *rpu_a1_openamp_reserved_memory,
               *rpu_b0_openamp_reserved_memory,
               *rpu_b1_openamp_reserved_memory,
               *rpu_c0_openamp_reserved_memory,
               *rpu_c1_openamp_reserved_memory,
               *rpu_d0_openamp_reserved_memory,
               *rpu_d1_openamp_reserved_memory,
               *rpu_e0_openamp_reserved_memory,
               *rpu_e1_openamp_reserved_memory,
               *rpu_a0_isp_reserved_memory,
               *rpu_a1_isp_reserved_memory,
               *rpu_b0_isp_reserved_memory,
               *rpu_b1_isp_reserved_memory,
               *rpu_c0_isp_reserved_memory,
               *rpu_c1_isp_reserved_memory,
               *rpu_d0_isp_reserved_memory,
               *rpu_d1_isp_reserved_memory,
               *rpu_e0_isp_reserved_memory,
               *rpu_e1_isp_reserved_memory,
               *rpu0vdev0vring1,
               *rpu0vdev0vring0,
               *rpu0vdev0buffer,
               *ddrboot,
               *rsctbl ]


    memory:
      - dev: linux_ddr
        size: 1536M
        spec_name: Linux_DDR
        start: '0x20000000'
      - dev: linux_cma
        size: 4096M
        spec_name: Linux_CMA
        start: '0x00A00000000'
      - dev: xra_allocator
        size: 2048M
        spec_name: XRT_Allocator
        start: '0x50000000000'
    sram:
      - dev: axi_bram_ctrl_0@b0000000
        size: 8 KB
        spec_name: axi_bram_ctrl_0
        start: '0xb0000000'
    access:
      - dev: cpus_r52_0
        flags: {}
      - dev: r52_0a_atcm_global@eba00000
        label: r52_0a_atcm_global
        flags: {}
      - dev: r52_0a_btcm_global@eba10000
        label: r52_0a_ctcm_global
        flags: {}
      - dev: r52_0a_ctcm_global@eba20000
        label: r52_0a_ctcm_global
        flags: {}
      - dev: ethernet@f1a60000
        flags: {}
        label: gem0
        spec_name: GEM0
      - dev: ethernet@ed920000
        flags: {}
        label: mmi_10gbe
        spec_name: MMI_10GBE
      - dev: dma-controller@ebd00000
