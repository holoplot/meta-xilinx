definitions:
  rpu6_fw: &rpu6_fw
    - start: 0xc000000
      size:  0x3800000
      no-map: true
  rpu7_fw: &rpu7_fw
    - start: 0x1082A000
      size: 0x3800000
      no-map: true
  rpu8_fw: &rpu8_fw
    - start: 0x15054000
      size: 0x3800000
      no-map: true
  rpu9_fw: &rpu9_fw
    - start: 0x1987E000
      size: 0x3800000
      no-map: true

domains:
  APU_Linux:
    compatible: openamp,domain-v1
    cpus:
      - cluster: cpus_a78
        cpumask: 0xf
        mode:
          secure: false
          el: 0x3
    os,type: linux
    domain-to-domain:
        compatible: openamp,domain-to-domain-v1
        remoteproc-relation:
            compatible: openamp,remoteproc-v2
            remote:
                - RPU6_ISP_FW
                - RPU7_ISP_FW
                - RPU8_ISP_FW
                - RPU9_ISP_FW
            elfload:
                - [ r52_0d_atcm_global, r52_0d_btcm_global, r52_0d_ctcm_global, rpu6_fw ]
                - [ r52_1d_atcm_global, r52_1d_btcm_global, r52_1d_ctcm_global, rpu7_fw ]
                - [ r52_0e_atcm_global, r52_0e_btcm_global, r52_0e_ctcm_global, rpu8_fw ]
                - [ r52_1e_atcm_global, r52_1e_btcm_global, r52_1e_ctcm_global, rpu9_fw ]

    reserved-memory:
        <<+: [ *rpu6_fw,
               *rpu7_fw,
               *rpu8_fw,
               *rpu9_fw ]

  RPU6_ISP_FW:
    compatible: openamp,domain-v1
    cpus:
      - cluster: cpus_r52_6
        cluster_cpu: cortexr52_6
        cpumask: 0x1
        mode:
          secure: true
          el: 0x3
    os,type: baremetal
    reserved-memory:
        ranges: true
        <<+: [ *rpu6_fw ]
  RPU7_ISP_FW:
    compatible: openamp,domain-v1
    cpus:
      - cluster: cpus_r52_7
        cluster_cpu: cortexr52_7
        cpumask: 0x1
        mode:
          secure: true
          el: 0x3
    os,type: baremetal
    reserved-memory:
        ranges: true
        <<+: [ *rpu7_fw ]
  RPU8_ISP_FW:
    compatible: openamp,domain-v1
    cpus:
      - cluster: cpus_r52_8
        cluster_cpu: cortexr52_8
        cpumask: 0x1
        mode:
          secure: true
          el: 0x3
    os,type: baremetal
    reserved-memory:
        ranges: true
        <<+: [ *rpu8_fw ]
  RPU9_ISP_FW:
    compatible: openamp,domain-v1
    cpus:
      - cluster: cpus_r52_9
        cluster_cpu: cortexr52_9
        cpumask: 0x1
        mode:
          secure: true
          el: 0x3
    os,type: baremetal
    reserved-memory:
        ranges: true
        <<+: [ *rpu9_fw ]
