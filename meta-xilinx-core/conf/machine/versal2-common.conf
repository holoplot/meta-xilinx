#@TYPE: Machine
#@NAME: versal2-common
#@DESCRIPTION: Machine configuration for a common Versal2 filesystem devices

#### Preamble
MACHINEOVERRIDES =. "${@['', 'versal2-common:']['versal2-common' != '${MACHINE}']}"
#### Regular settings follow

DEFAULTTUNE = "cortexa72-cortexa53"

require conf/machine/versal2-generic.conf

MACHINE_FEATURES += "\
    vcu2 \
    malig78ae \
    fpga-overlay \
    optee \
    "

#### No additional settings should be after the Postamble
#### Postamble
PACKAGE_EXTRA_ARCHS:append = "${@['', ' versal2_common']['versal2-common' != "${MACHINE}"]}"
